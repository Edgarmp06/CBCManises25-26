<h1 style="position: absolute; left: -9999px;">CBC Manises-Quart - Cadete Masculino Temporada 2025/26 - Calendario, Resultados y Partidos en Directo</h1>

<div id="app" class="contenido-web"></div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getFirestore, collection, addDoc, deleteDoc, doc, updateDoc, query, orderBy, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

    const firebaseConfig = {
        apiKey: "AIzaSyAOG8EroOz3pn9o1fLYxbtTTV2laFBqd2s",
        authDomain: "cbc-manises.firebaseapp.com",
        projectId: "cbc-manises",
        storageBucket: "cbc-manises.firebasestorage.app",
        messagingSenderId: "756895829915",
        appId: "1:756895829915:web:b70f5930703f183bf65b3e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const EQUIPOS_RIVALES = [
        { nombre: 'Picanya Bàsquet FuturPiso 10', logo: 'picanya.jpg' },
        { nombre: 'Isolia NB Torrent B', logo: 'torrent.jpg' },
        { nombre: 'Mislata BC Verde', logo: 'mislata.jpg' },
        { nombre: 'CB Moncada A', logo: 'moncada.jpg' },
        { nombre: 'Picken MA A', logo: 'picken.jpg' }
    ];

    const UBICACIONES = [
        { nombre: 'Pabellón Alberto Arnal (Manises)', esLocal: true },
        { nombre: 'Pabellón Municipal Picanya', esLocal: false },
        { nombre: 'Pabellón El Vedat (Torrent)', esLocal: false },
        { nombre: 'Pabellón El Quint (Mislata)', esLocal: false },
        { nombre: 'Pabellón Badia Pedretera (Moncada)', esLocal: false },
        { nombre: 'Pabellón Benimaclet (Valencia)', esLocal: false }
    ];

    let partidos = [];
    let actas = [];
    let isAdmin = false;
    let showAdminPanel = false;
    let editingPartido = null;
    let activeTab = 'calendario';
    let unsubscribe = null;
    let unsubscribeActas = null;
    let mostrarUbicacionManual = false;
    let viendoActa = null;
    let creandoActa = false;
    let modoAdmin = 'partidos';

    let formData = {
        fecha: '',
        hora: '',
        rival: '',
        logoRival: '',
        esLocal: true,
        ubicacion: 'Pabellón Alberto Arnal (Manises)',
        ubicacionPersonalizada: '',
        jornada: '',
        finalizado: false,
        resultadoLocal: '',
        resultadoVisitante: '',
        enDirecto: false,
        cuartoActual: ''
    };

    let actaFormData = {
        partidoId: '',
        jugadores: []
    };

    function iniciarListenerTiempoReal() {
        if (unsubscribe) return;
        const q = query(collection(db, 'partidos'), orderBy('fecha', 'asc'));
        unsubscribe = onSnapshot(q, (querySnapshot) => {
            partidos = querySnapshot.docs.map(doc => ({
                id: doc.id,
                ...doc.data()
            }));
            renderizar();
        });
    }

    function iniciarListenerActas() {
        if (unsubscribeActas) return;
        const q = query(collection(db, 'actas'));
        unsubscribeActas = onSnapshot(q, (querySnapshot) => {
            actas = querySnapshot.docs.map(doc => ({
                id: doc.id,
                ...doc.data()
            }));
            renderizar();
        });
    }

    async function cargarPartidos() {
        iniciarListenerTiempoReal();
        iniciarListenerActas();
    }

    async function añadirPartido() {
        const ubicacionFinal = mostrarUbicacionManual ? formData.ubicacionPersonalizada : formData.ubicacion;
        
        if (!formData.fecha || !formData.hora || !formData.rival || !ubicacionFinal || !formData.jornada) {
            alert('Por favor completa todos los campos obligatorios');
            return;
        }
        
        const dataToSave = {
            fecha: formData.fecha,
            hora: formData.hora,
            rival: formData.rival,
            logoRival: formData.logoRival,
            esLocal: formData.esLocal,
            ubicacion: ubicacionFinal,
            jornada: formData.jornada,
            finalizado: formData.finalizado,
            resultadoLocal: formData.resultadoLocal,
            resultadoVisitante: formData.resultadoVisitante,
            enDirecto: formData.enDirecto,
            cuartoActual: formData.cuartoActual || ''
        };
        
        try {
            await addDoc(collection(db, 'partidos'), dataToSave);
            alert('Partido añadido correctamente');
            resetForm();
        } catch (error) {
            console.error('Error:', error);
            alert('Error al añadir partido');
        }
    }

    async function eliminarPartido(id) {
        if (confirm('¿Estás seguro de eliminar este partido?')) {
            try {
                await deleteDoc(doc(db, 'partidos', id));
                alert('Partido eliminado');
            } catch (error) {
                console.error('Error:', error);
                alert('Error al eliminar partido');
            }
        }
    }

    function editarPartido(partido) {
        editingPartido = partido;
        const esUbicacionPredefinida = UBICACIONES.some(u => u.nombre === partido.ubicacion);
        mostrarUbicacionManual = !esUbicacionPredefinida;
        
        formData = {
            fecha: partido.fecha || '',
            hora: partido.hora || '',
            rival: partido.rival || '',
            logoRival: partido.logoRival || '',
            esLocal: partido.esLocal !== undefined ? partido.esLocal : true,
            ubicacion: esUbicacionPredefinida ? partido.ubicacion : 'MANUAL',
            ubicacionPersonalizada: esUbicacionPredefinida ? '' : partido.ubicacion,
            jornada: partido.jornada || '',
            finalizado: partido.finalizado || false,
            resultadoLocal: partido.resultadoLocal || '',
            resultadoVisitante: partido.resultadoVisitante || '',
            enDirecto: partido.enDirecto || false,
            cuartoActual: partido.cuartoActual || ''
        };
        renderizar();
    }

    async function actualizarPartido() {
        const ubicacionFinal = mostrarUbicacionManual ? formData.ubicacionPersonalizada : formData.ubicacion;
        
        if (!formData.fecha || !formData.hora || !formData.rival || !ubicacionFinal || !formData.jornada) {
            alert('Por favor completa todos los campos obligatorios');
            return;
        }
        
        const dataToSave = {
            fecha: formData.fecha,
            hora: formData.hora,
            rival: formData.rival,
            logoRival: formData.logoRival,
            esLocal: formData.esLocal,
            ubicacion: ubicacionFinal,
            jornada: formData.jornada,
            finalizado: formData.finalizado,
            resultadoLocal: formData.resultadoLocal,
            resultadoVisitante: formData.resultadoVisitante,
            enDirecto: formData.enDirecto,
            cuartoActual: formData.cuartoActual || ''
        };
        
        try {
            await updateDoc(doc(db, 'partidos', editingPartido.id), dataToSave);
            alert('Partido actualizado correctamente');
            editingPartido = null;
            resetForm();
        } catch (error) {
            console.error('Error:', error);
            alert('Error al actualizar partido');
        }
    }

    async function actualizarMarcador(id, campo, incremento) {
        const partido = partidos.find(p => p.id === id);
        if (!partido) return;

        const nuevoValor = parseInt(partido[campo] || 0) + incremento;
        if (nuevoValor < 0) return;

        try {
            await updateDoc(doc(db, 'partidos', id), {
                [campo]: nuevoValor.toString(),
                enDirecto: true
            });
        } catch (error) {
            console.error('Error:', error);
        }
    }

    async function actualizarCuarto(id, cuarto) {
        try {
            await updateDoc(doc(db, 'partidos', id), {
                cuartoActual: cuarto
            });
        } catch (error) {
            console.error('Error:', error);
        }
    }

    function resetForm() {
        formData = {
            fecha: '',
            hora: '',
            rival: '',
            logoRival: '',
            esLocal: true,
            ubicacion: 'Pabellón Alberto Arnal (Manises)',
            ubicacionPersonalizada: '',
            jornada: '',
            finalizado: false,
            resultadoLocal: '',
            resultadoVisitante: '',
            enDirecto: false,
            cuartoActual: ''
        };
        mostrarUbicacionManual = false;
    }

    function handleInputChange(name, value) {
        formData[name] = value;

        if (name === 'rival') {
            const equipoSeleccionado = EQUIPOS_RIVALES.find(e => e.nombre === value);
            if (equipoSeleccionado) {
                formData.logoRival = equipoSeleccionado.logo;
            }
            renderizar();
            return;
        }

        if (name === 'ubicacion') {
            if (value === 'MANUAL') {
                mostrarUbicacionManual = true;
            } else {
                mostrarUbicacionManual = false;
                const ubicacionSeleccionada = UBICACIONES.find(u => u.nombre === value);
                if (ubicacionSeleccionada) {
                    formData.esLocal = ubicacionSeleccionada.esLocal;
                }
            }
            renderizar();
            return;
        }

        if (name === 'finalizado') {
            renderizar();
            return;
        }
    }

    async function handleAdminLogin() {
        const email = prompt('Email de administrador:');
        if (!email) return;
        
        const password = prompt('Contraseña:');
        if (!password) return;

        try {
            const { getAuth, signInWithEmailAndPassword } = await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js');
            const auth = getAuth(app);
            
            await signInWithEmailAndPassword(auth, email, password);
            
            isAdmin = true;
            alert('Acceso concedido');
            renderizar();
        } catch (error) {
            console.error('Error de login:', error);
            alert('Email o contraseña incorrectos');
        }
    }

    // FUNCIONES DE ACTAS
    function iniciarCreacionActa() {
        creandoActa = true;
        modoAdmin = 'actas';
        actaFormData = {
            partidoId: '',
            jugadores: []
        };
        renderizar();
    }

    function añadirJugadorActa() {
        actaFormData.jugadores.push({
            dorsal: '',
            nombre: '',
            pts: 0,
            min: 0,
            tl_anotados: 0,
            tl_intentos: 0,
            t2_anotados: 0,
            t2_intentos: 0,
            t3_anotados: 0,
            t3_intentos: 0,
            fc: 0
        });
        renderizar();
    }

    function eliminarJugadorActa(index) {
        actaFormData.jugadores.splice(index, 1);
        renderizar();
    }

    function actualizarJugadorActa(index, campo, valor) {
        actaFormData.jugadores[index][campo] = valor;
    }

    function calcularPorcentajeTL(anotados, intentos) {
        if (intentos === 0) return null;
        return Math.round((anotados / intentos) * 100);
    }

async function guardarActa() {
    console.log('=== INICIANDO GUARDADO DE ACTA ===');
    console.log('Partido ID:', actaFormData.partidoId);
    console.log('Número de jugadores:', actaFormData.jugadores.length);
    
    if (!actaFormData.partidoId) {
        alert('❌ Error: Selecciona un partido');
        return;
    }

    if (actaFormData.jugadores.length === 0) {
        alert('❌ Error: Añade al menos un jugador');
        return;
    }

    const partido = partidos.find(p => p.id === actaFormData.partidoId);
    if (!partido) {
        alert('❌ Error: Partido no encontrado');
        return;
    }

    // Validar datos de jugadores
    for (let i = 0; i < actaFormData.jugadores.length; i++) {
        const j = actaFormData.jugadores[i];
        
        console.log(`Validando jugador ${i + 1}:`, j);
        
        if (!j.dorsal || j.dorsal.trim() === '') {
            alert(`❌ Jugador ${i + 1}: El dorsal es obligatorio`);
            return;
        }
        
        if (!j.nombre || j.nombre.trim() === '') {
            alert(`❌ Jugador ${i + 1}: El nombre es obligatorio`);
            return;
        }
        
        const t2_an = parseInt(j.t2_anotados) || 0;
        const t2_int = parseInt(j.t2_intentos) || 0;
        const t3_an = parseInt(j.t3_anotados) || 0;
        const t3_int = parseInt(j.t3_intentos) || 0;
        const tl_an = parseInt(j.tl_anotados) || 0;
        const tl_int = parseInt(j.tl_intentos) || 0;
        
        if (t2_an > t2_int) {
            alert(`❌ Jugador ${i + 1}: T2 anotados (${t2_an}) no puede ser mayor que intentos (${t2_int})`);
            return;
        }
        
        if (t3_an > t3_int) {
            alert(`❌ Jugador ${i + 1}: T3 anotados (${t3_an}) no puede ser mayor que intentos (${t3_int})`);
            return;
        }
        
        if (tl_an > tl_int) {
            alert(`❌ Jugador ${i + 1}: TL anotados (${tl_an}) no puede ser mayor que intentos (${tl_int})`);
            return;
        }
    }

    console.log('✅ Validación completada. Procesando jugadores...');

    const jugadoresProcesados = actaFormData.jugadores.map(j => ({
        dorsal: j.dorsal.trim(),
        nombre: j.nombre.trim().toUpperCase(),
        pts: parseInt(j.pts) || 0,
        min: parseInt(j.min) || 0,
        tl: {
            anotados: parseInt(j.tl_anotados) || 0,
            intentos: parseInt(j.tl_intentos) || 0,
            porcentaje: calcularPorcentajeTL(parseInt(j.tl_anotados) || 0, parseInt(j.tl_intentos) || 0)
        },
        t2: {
            anotados: parseInt(j.t2_anotados) || 0,
            intentos: parseInt(j.t2_intentos) || 0
        },
        t3: {
            anotados: parseInt(j.t3_anotados) || 0,
            intentos: parseInt(j.t3_intentos) || 0
        },
        fc: parseInt(j.fc) || 0
    }));

    console.log('Jugadores procesados:', jugadoresProcesados);

    const actaData = {
        partidoId: actaFormData.partidoId,
        fecha: partido.fecha,
        rival: partido.rival,
        logoRival: partido.logoRival,
        esLocal: partido.esLocal,
        ubicacion: partido.ubicacion,
        resultadoLocal: partido.resultadoLocal,
        resultadoVisitante: partido.resultadoVisitante,
        jornada: partido.jornada,
        jugadores: jugadoresProcesados
    };

    console.log('Datos del acta a guardar:', actaData);

    try {
        console.log('Guardando en Firebase...');
        await addDoc(collection(db, 'actas'), actaData);
        console.log('✅ Acta guardada exitosamente');
        alert('✅ Acta guardada correctamente');
        creandoActa = false;
        modoAdmin = 'partidos';
        actaFormData = { partidoId: '', jugadores: [] };
        renderizar();
    } catch (error) {
        console.error('❌ Error al guardar:', error);
        alert('❌ Error al guardar acta: ' + error.message);
    }
}

    function verActa(partidoId) {
        const acta = actas.find(a => a.partidoId === partidoId);
        if (!acta) {
            alert('No hay acta para este partido');
            return;
        }
        viendoActa = acta;
        renderizar();
    }

    function cerrarActa() {
        viendoActa = null;
        renderizar();
    }

    function cancelarCreacionActa() {
        creandoActa = false;
        modoAdmin = 'partidos';
        actaFormData = { partidoId: '', jugadores: [] };
        renderizar();
    }

    function seleccionarPartidoActa(partidoId) {
        actaFormData.partidoId = partidoId;
        renderizar();
    }

    function generarPartidoCard(partido) {
        const equipoLocal = partido.esLocal ? 'CBC Manises-Quart' : partido.rival;
        const equipoVisitante = partido.esLocal ? partido.rival : 'CBC Manises-Quart';
        const logoLocal = partido.esLocal ? 'logos/cbc-manises.jpg' : `logos/${partido.logoRival}`;
        const logoVisitante = partido.esLocal ? `logos/${partido.logoRival}` : 'logos/cbc-manises.jpg';
        const tieneActa = actas.some(a => a.partidoId === partido.id);

        return `
            <div class="bg-white rounded-lg shadow-md p-6 mb-4">
                ${partido.jornada ? `
                    <div class="text-center mb-4">
                        <span class="bg-orange-500 text-white px-4 py-1 rounded-full text-sm font-bold">
                            Jornada ${partido.jornada}
                        </span>
                    </div>
                ` : ''}

                ${partido.cuartoActual && !partido.finalizado ? `
                    <div class="text-center mb-3">
                        <span class="cuarto-badge">
                            ${partido.cuartoActual} Cuarto
                        </span>
                    </div>
                ` : ''}

                ${partido.enDirecto && !partido.finalizado ? `
                    <div class="text-center mb-2">
                        <span class="text-red-600 text-sm font-bold animate-pulse">● EN DIRECTO</span>
                    </div>
                ` : ''}

                <div class="flex items-center justify-center gap-6">
                    <!-- Equipo Local -->
                    <div class="flex items-center gap-3">
                        <div class="w-16 h-16 flex items-center justify-center">
                            <img 
                                src="${logoLocal}"
                                alt="Logo ${equipoLocal}"
                                class="max-w-full max-h-full object-contain"
                                onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"

    // FUNCIONES DE ESTADÍSTICAS
    function procesarDatosEstadisticas() {
        // Objeto para acumular estadísticas por jugador
        const estadisticasJugadores = {};

        // Procesar todas las actas
        actas.forEach(acta => {
            acta.jugadores.forEach(jugador => {
                const nombre = jugador.nombre;

                if (!estadisticasJugadores[nombre]) {
                    estadisticasJugadores[nombre] = {
                        nombre: nombre,
                        dorsal: jugador.dorsal,
                        partidos: 0,
                        puntosTotal: 0,
                        minTotal: 0,
                        tlAnotados: 0,
                        tlIntentos: 0,
                        faltasTotal: 0,
                        puntosPorJornada: {}
                    };
                }

                estadisticasJugadores[nombre].partidos++;
                estadisticasJugadores[nombre].puntosTotal += jugador.pts || 0;
                estadisticasJugadores[nombre].minTotal += jugador.min || 0;
                estadisticasJugadores[nombre].tlAnotados += jugador.tl.anotados || 0;
                estadisticasJugadores[nombre].tlIntentos += jugador.tl.intentos || 0;
                estadisticasJugadores[nombre].faltasTotal += jugador.fc || 0;
                estadisticasJugadores[nombre].puntosPorJornada[acta.jornada] = jugador.pts || 0;
            });
        });

        return estadisticasJugadores;
    }

    function obtenerTop5Anotadores() {
        const stats = procesarDatosEstadisticas();
        return Object.values(stats)
            .sort((a, b) => b.puntosTotal - a.puntosTotal)
            .slice(0, 5);
    }

    function obtenerPuntosPorJornada() {
        const puntosPorJornada = {};

        actas.forEach(acta => {
            if (!puntosPorJornada[acta.jornada]) {
                puntosPorJornada[acta.jornada] = 0;
            }

            acta.jugadores.forEach(jugador => {
                puntosPorJornada[acta.jornada] += jugador.pts || 0;
            });
        });

        return puntosPorJornada;
    }

    function crearGraficaEvolucionPuntos() {
        const canvas = document.getElementById('chartEvolucionPuntos');
        if (!canvas) return;

        const top5 = obtenerTop5Anotadores();
        const jornadas = Array.from(new Set(actas.map(a => a.jornada))).sort((a, b) => a - b);

        const coloresJugadores = [
            '#FF6B35',
            '#E85A2A',
            '#FFA500',
            '#FF8C42',
            '#FFAA5C'
        ];

        const datasets = top5.map((jugador, index) => {
            return {
                label: jugador.nombre,
                data: jornadas.map(jornada => jugador.puntosPorJornada[jornada] || 0),
                borderColor: coloresJugadores[index],
                backgroundColor: coloresJugadores[index] + '33',
                tension: 0.3,
                fill: false,
                borderWidth: 2
            };
        });

        new Chart(canvas, {
            type: 'line',
            data: {
                labels: jornadas.map(j => 'J' + j),
                datasets: datasets
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom'
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            stepSize: 2
                        }
                    }
                }
            }
        });
    }

    function crearGraficaPuntosPorJornada() {
        const canvas = document.getElementById('chartPuntosPorJornada');
        if (!canvas) return;

        const puntosPorJornada = obtenerPuntosPorJornada();
        const jornadas = Object.keys(puntosPorJornada).sort((a, b) => a - b);
        const puntos = jornadas.map(j => puntosPorJornada[j]);

        new Chart(canvas, {
            type: 'bar',
            data: {
                labels: jornadas.map(j => 'Jornada ' + j),
                datasets: [{
                    label: 'Puntos del Equipo',
                    data: puntos,
                    backgroundColor: '#FF6B35',
                    borderColor: '#E85A2A',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        display: false
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            stepSize: 10
                        }
                    }
                }
            }
        });
    }

    function crearGraficaTop5Anotadores() {

            console.error('Error al cerrar sesión:', error);
        }
        
        isAdmin = false;
        showAdminPanel = false;
        renderizar();
    };
    window.cambiarTab = (tab) => {
        activeTab = tab;
        renderizar();
    };
    window.cancelarEdicion = () => {
        editingPartido = null;
        resetForm();
        renderizar();
    };
    window.cambiarModoAdmin = (modo) => {
        modoAdmin = modo;
        renderizar();
    };

    // Funciones de Actas
    window.iniciarCreacionActaGlobal = iniciarCreacionActa;
    window.añadirJugadorActaGlobal = añadirJugadorActa;
    window.eliminarJugadorActaGlobal = eliminarJugadorActa;
    window.actualizarJugadorActaGlobal = actualizarJugadorActa;
    window.guardarActaGlobal = guardarActa;
    window.verActaGlobal = verActa;
    window.cerrarActaGlobal = cerrarActa;
    window.cancelarCreacionActaGlobal = cancelarCreacionActa;
    window.seleccionarPartidoActaGlobal = seleccionarPartidoActa;

    document.addEventListener('DOMContentLoaded', async () => {
        cargarPartidos();
        iniciarRotacionFotos();
        
        try {
            const { getAuth, onAuthStateChanged } = await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js');
            const auth = getAuth(app);
            
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    isAdmin = true;
                    renderizar();
                }
            });
        } catch (error) {
            console.error('Error al verificar sesión:', error);
        }
    });
    
    function iniciarRotacionFotos() {
        let fotoActual = 0;
        const totalFotos = 4;
        
        setInterval(() => {
            document.querySelectorAll('.fondo-foto').forEach(foto => {
                foto.classList.remove('activa');
            });
            
            fotoActual = (fotoActual + 1) % totalFotos;
            
            document.querySelectorAll('.fondo-foto')[fotoActual].classList.add('activa');
        }, 6000);
    }
</script>
</body>

</html>
