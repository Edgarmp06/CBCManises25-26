    <link rel="manifest" href="manifest.json">

    <link rel="preconnect" href="https://cdn.tailwindcss.com">

        "@context": "https://schema.org",

        "memberOf": {

        }
    }

    <style>
        /* Estilos críticos para el loader inicial */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #FF6B35 0%, #ea580c 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out, visibility 0.5s;
        }

        .loader-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loader-text {
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        #loading-screen.fade-out {
            opacity: 0;
            visibility: hidden;
        }
    </style>
</head>

<body>
    <!-- Pantalla de carga inicial -->
    <div id="loading-screen">
        <div class="loader-spinner"></div>
        <div class="loader-text">Cargando CBC Manises...</div>
    </div>

    <!-- Fondo rotativo con imágenes del equipo -->
    <div class="contenedor-fotos" role="presentation" aria-hidden="true">
        <div class="fondo-foto fondo-1 activa"></div>
        <div class="fondo-foto fondo-2"></div>
        <div class="fondo-foto fondo-3"></div>
        <div class="fondo-foto fondo-4"></div>
    </div>

    <!-- Overlay naranja -->
    <div class="overlay-naranja" role="presentation" aria-hidden="true"></div>

    <!-- SEO: H1 oculto para Google -->
    <h1 class="sr-only" style="position: absolute; left: -9999px;">
        CBC Manises-Quart - Cadete Masculino Temporada 2025/26 - Amistosos / Copa Valenciana - Calendario, Resultados y Partidos en Directo
    </h1>

    <!-- Contenedor principal de la aplicación -->
    <div id="app" class="contenido-web" role="main"></div>

    <!-- Fallback de carga en caso de que el módulo JS no arranque -->
    <script>
        window.addEventListener('error', (event) => {
            console.error('Error de JavaScript detectado:', event.error || event.message);
        });

        window.addEventListener('unhandledrejection', (event) => {
            console.error('Promise rechazada sin capturar:', event.reason);
        });

        window.forzarRefrescoPersonalizado = function () {
            const loader = document.getElementById('loading-screen');
            const app = document.getElementById('app');
            if (loader) {
                loader.classList.add('fade-out');
                setTimeout(() => loader.remove(), 500);
            }
            if (app && (!app.innerHTML || app.innerHTML.trim() === '')) {
                app.innerHTML = `
                    <div class="min-h-screen flex items-center justify-center p-4">
                        <div class="bg-white rounded-xl shadow-lg p-6 text-center max-w-md mx-auto">
                            <h2 class="text-xl font-bold text-red-700 mb-3">No se ha podido cargar la aplicación</h2>
                            <p class="text-sm text-gray-600 mb-4">Es posible que haya un error en el código o un problema de caché del navegador.</p>
                            <button onclick="location.reload()" class="bg-orange-600 text-white px-4 py-2 rounded-lg hover:bg-orange-700 transition">Recargar</button>
                        </div>
                    </div>
                `;
            }
        };

        setTimeout(() => {
            const loader = document.getElementById('loading-screen');
            const app = document.getElementById('app');
            if (loader && app && (!app.innerHTML || app.innerHTML.trim() === '')) {
                console.warn('El fallback de carga se ha activado. Ocultando loader.');
                loader.classList.add('fade-out');
                setTimeout(() => loader.remove(), 500);
                window.forzarRefrescoPersonalizado();
            }
        }, 10000);
    </script>

    <!-- JavaScript de la aplicación (ES6 Modules) -->
    <script type="module" src="js/app.js"></script>
</body>

</html>
